<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger — To-Do</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="app">

    <header class="header">
      <div class="eyebrow">Task 04 · SkillCraft Technology</div>
      <h1>Ledger</h1>
      <p class="subtitle">A to-do list that keeps its receipts.</p>
    </header>

    <section class="stats-row" id="statsRow">
      <div class="stat">
        <span class="stat-value" id="statTotal">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="statActive">0</span>
        <span class="stat-label">Active</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="statDone">0</span>
        <span class="stat-label">Done</span>
      </div>
      <div class="stat stat-progress">
        <div class="progress-ring-wrap">
          <svg viewBox="0 0 40 40" class="progress-ring">
            <circle class="ring-track" cx="20" cy="20" r="16" />
            <circle class="ring-fill" id="ringFill" cx="20" cy="20" r="16" />
          </svg>
          <span class="ring-percent" id="ringPercent">0%</span>
        </div>
        <span class="stat-label">Complete</span>
      </div>
    </section>

    <section class="glass-card">

      <form class="add-form" id="addForm">
        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="Add a task…"
          maxlength="120"
          autocomplete="off"
          required
        />
        <div class="add-form-row">
          <input type="date" id="dateInput" class="date-input" />
          <input type="time" id="timeInput" class="time-input" />
          <button type="submit" class="btn-add" aria-label="Add task">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
            Add
          </button>
        </div>
      </form>

      <div class="filter-row" role="tablist" aria-label="Task filter">
        <button class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
        <button class="filter-btn" data-filter="active" role="tab" aria-selected="false">Active</button>
        <button class="filter-btn" data-filter="completed" role="tab" aria-selected="false">Completed</button>
        <button class="clear-done-btn" id="clearDoneBtn">Clear completed</button>
      </div>

      <ul class="task-list" id="taskList">
        <li class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" width="34" height="34"><path d="M9 12l2 2 4-4M12 3a9 9 0 100 18 9 9 0 000-18z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <p>Nothing here yet — add your first task above.</p>
        </li>
      </ul>

    </section>

    <footer>Built for SkillCraft Technology Internship — Task 04</footer>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Edit modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>Edit task</h2>
      <input type="text" id="editTaskInput" class="task-input" maxlength="120" />
      <div class="add-form-row">
        <input type="date" id="editDateInput" class="date-input" />
        <input type="time" id="editTimeInput" class="time-input" />
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" id="editCancelBtn" type="button">Cancel</button>
        <button class="btn-add" id="editSaveBtn" type="button">Save changes</button>
      </div>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
